<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="desktop.css">
    <title>Document</title>
</head>
<body>
    <div class="main_container">
        <video autoplay muted playsinline id="loading_bar">
            <source src="Assets/loading_bar.mp4" type="video/mp4">
        </video>
        <button id="sign-in" onclick="launch()"> Sign-in </button>
        <!-- desktop elements -->
        <div id="desktop_container">
            <video autoplay loop muted id="wallpaper">
                <source src="Assets/desktop/background2.mp4" type="video/mp4">
            </video>
            <!-- boxes -->
            <div class="containers" id="b1">
                <button class="circles" id="c1" onclick="test()"></button>
                <div id="l2" class="lines"></div>
            </div>
            <div class="containers" id="b2"> Date, time and weather Here </div>
            <!-- lines -->
            <svg id="l1" class="lines" height="11vh" width="100vw">
                <path d="M0 5 L975 5 L1025 85 L1920 85" stroke="rgb(255, 255, 255, 0.3)" stroke-width="7" fill="none"  stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M0 5 L975 5 L1025 85 L1920 85" stroke="rgb(200, 200, 200, 0.2)" stroke-width="2" fill="none"/>
            </svg>
            <!-- circles -->
            <div class="circles hoverable" id="c2"></div>
            <div class="circles hoverable" id="c3"></div>
            <div class="circles hoverable" id="c4"></div>
        </div>
    </div>
</body>
<script src="script_2.js"></script>
</html>
