<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To KrishOS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main_container">
        <div id="startup_container">
            <p id="welcome">Welcome to KrishOS</p>
            <button onclick="fullscreen()" id="fullscreen_button"> Launch </button>
            <video autoplay muted loop playsinline id="startup_animation">
                <source src="Assets/startup_screen.mp4" type="video/mp4">
            </video>
            <img src="Assets/logo.png" id="logo">
            <div id="loading"></div>
            <p id="loading_message"> Loading KrishOS... </p>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
